body:
  text: 界論歸命彼世尊應供等覺者論母設置分攝非攝所攝者之非攝非攝者之所攝所攝者之所攝非攝者之非攝相應不相應相應者之不相應不相應者之相應相應者之相應不相應者之不相應所攝者之相應與不相應相應者之所攝與非攝非攝者之相相應與不相應不相應者之所攝與非攝五蘊十二處十八界四諦二十二根緣起四念處四正勝四神足四靜慮四無量五根五力七覺支八聖道觸受想思心勝解作意三法之攝三法之非攝四法之相應四法之不相應同分不同分此等皆是法聚界論之論母第一所攝與非攝一色蘊是所攝幾何之蘊處界耶色蘊是所攝一蘊十一處十一界幾何非攝耶非攝四蘊一處七界二受蘊所攝幾何之蘊處界耶受蘊所攝一蘊一處一界幾何非攝耶非攝四蘊十一處十七界三想蘊所攝幾何之蘊處界耶想蘊所攝一蘊一處一界幾何非攝耶非攝四蘊十一處十七界四行蘊所攝幾何之蘊處界耶行蘊所攝一蘊一處一界幾何非攝耶非攝四蘊十一處十七界五識蘊所攝幾何之蘊處界耶識蘊所攝一蘊一處七界幾何非攝耶非攝四蘊十一處十一界六色蘊與受蘊者所攝幾何之蘊處界耶色蘊與受蘊者所攝二蘊十一處十一界幾何非攝耶非攝三蘊一處七界七色蘊與想蘊者所攝二蘊十一處十一界幾何非攝耶非攝三蘊一處七界八色蘊與行蘊者所攝二蘊十一處十一界幾何非攝耶非攝三蘊一處七界九色蘊與識蘊者所攝二蘊十三處十八界幾何非攝耶雖非攝三蘊於處界無非攝一色蘊受蘊想蘊者所攝幾何之蘊處界耶色蘊受蘊想蘊者所攝三蘊十一處十一界幾何非攝耶非攝二蘊一處七界一一色蘊受蘊行蘊者所攝三蘊十一處十一界幾何非攝耶非攝於二蘊一處七界一二色蘊受蘊識蘊者所攝三蘊十二處十八界幾何非攝耶非攝二蘊於處界無非攝一三色蘊受蘊想蘊行者所攝幾何之蘊處界耶色蘊受蘊想蘊行蘊者所攝四蘊十一處十一界幾何非攝耶非攝一蘊一處七界一四色蘊受蘊想蘊識蘊者所攝四蘊十二處十八界幾何非攝耶非攝一蘊於處界無非攝一五色蘊受蘊想蘊行蘊識蘊者所攝幾何之蘊處界耶色蘊受蘊想蘊行蘊識蘊者所攝五蘊十二處十八界幾何非攝耶亦無非攝如何之蘊處界一六五蘊是所攝於幾何之蘊處界耶五蘊是所攝於五蘊十二處十八界幾何非攝耶亦無非攝如何之蘊處界一七眼處是所攝幾何之蘊處界耶眼處是所攝於一蘊一處一界幾何非攝耶非攝四蘊十一處十七界一八耳處是一九鼻處是二舌處是二一身處是二二色處是二三聲處是二四香處是二五味處是二六觸處是所攝於一一處一界幾何非攝耶非攝於四蘊十一處十七界二七意處者所攝於一蘊一處七界幾何非攝耶非攝於四蘊十一處十一界二八法處者無為法除蘊而外所攝於四蘊一處一界幾何非攝耶非攝於一蘊十一處十七界二九眼處耳處是所攝於一蘊二處二界幾何非攝耶非攝於四蘊十處十六界三三六眼處與鼻處者眼處與舌處者眼處與身處者眼處與色處者眼處與聲處是眼處與香處眼處與味處者三七眼處與觸處者所攝於一蘊二處二界幾何非攝耶非攝於四蘊十處十六界三八眼處與意處是所攝於二蘊二處八界幾何非攝耶非攝於三蘊十處十界三九眼處與法處是無為法除蘊而外所攝於四蘊二處二界幾何非攝耶非攝於一蘊十處十六界四十二處者所攝幾何之蘊處界耶十二處是以無為法除蘊外所攝於五蘊十二處十八處幾何非蘊耶亦無非攝於如何之蘊處界四一眼界是所攝於幾何之蘊處界耶眼界是所攝於一蘊一處一界幾何非攝耶非攝於四蘊十一處十七界四二五七耳界鼻界舌界身界色界聲界香界味界觸界眼識界耳識界鼻識界舌識界身識界意界意識界是即所攝於一蘊一處一界幾何非攝耶非攝於四蘊十一處十七界五八法界是以無為法除蘊而外所攝於四蘊一處一界幾何非攝耶非攝於一蘊一處十七界五九眼界與耳界是六眼界與鼻界是六一眼界與舌界是六二眼界與身界是六三眼界與色界是六四眼界與聲界是六五眼界與香界是六六眼界與味界是六七眼界與觸界是所攝於一蘊二處二界幾何非攝耶非攝於四蘊十處十六界六八眼界與眼識界是所攝於二蘊二處二界幾何非攝耶非攝於三蘊十處十六界六九眼界與耳識界是七眼界與鼻識界是七一眼界與舌識界是七二眼界與身識界是七三眼界與意界是七四眼界與意識界是所攝於二蘊二處二界幾何非攝耶非攝於三蘊十處十六界七五眼界與法界是以無為法除蘊而外所攝於四蘊二處二界幾何非攝耶非攝於一蘊十處十六界七六十八界者所攝於幾何之蘊處界耶十八界是以無為法由除蘊而外所攝於五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界七七苦諦是所攝幾何之蘊處界耶苦諦是所攝五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界七八集諦是所攝於一蘊七九道諦是所攝於一蘊一處一界幾何非攝耶非攝於四蘊十一處十七界八滅道是非所攝於蘊而所攝於一處一界幾何非攝耶非攝於五蘊十一處十七界八一苦諦與集諦是所攝於五蘊十二處十八界幾何非攝耶亦無非攝如何之蘊處界八二苦諦與道諦是所攝於五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界八三苦諦與滅諦是以無為法除蘊而外所攝於五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界八四苦諦集諦與道諦是所攝於五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界八五苦諦集諦滅諦是以無為法除蘊而外所攝於五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界八六苦諦集諦道諦滅諦者以無為法除蘊而外所攝於五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界八七四諦是所攝於幾何之蘊處界耶四諦是無為法除蘊而外所攝於五蘊十二處十八界幾何非攝耶亦無非攝於如何之蘊處界八八眼根者所攝於幾何之蘊處界耶眼根者所攝於一蘊一處一界幾何非攝耶非攝於四蘊十一處十八界八九九四耳根者鼻根舌根身根女根男根所攝於一蘊一處一界幾何非攝耶非攝於四蘊十一處十七界九五意根是所攝於一蘊一處七界幾何非攝耶非攝於四蘊十一處十一界九六命根是所攝於二蘊一處一界幾何非攝耶非攝於三蘊十一處十七界九七一九樂根者苦根者喜根者憂根者捨根者信根者勤根念根定根慧根未知當知根已知根具知根是所攝於一蘊一處一界幾何非攝耶非攝四蘊十一處十七界一一眼根與耳根是所攝於一蘊二處二界幾何非攝耶非攝於四蘊十處十六界一一一眼根與鼻根是一一二眼根與舌根是一一三眼根與身根是一一四眼根與女根是一一五眼根與男根是所攝於一蘊二處二界幾何非攝耶非攝四蘊十處十六界一一六眼根與意根是所攝於二蘊二處八界幾何非攝耶非攝三蘊十處十界一一七眼根與命根是所攝於二蘊二處二界幾何非攝耶非攝於三蘊十處十六界一一八眼根與樂根是一一九眼根與苦根是一二眼根與喜根是一二一眼根與憂根是一二二眼根與捨根是一二三眼根與信根是一二四眼根與勤根是一二五眼根與念根是一二六眼根與定根是一二七眼根與慧根是一二八眼根與未知當知根一二九眼根與已知根是一三眼根與具知根是所攝於二蘊二處二界幾何非攝耶非攝於三蘊十處十六界一三一二十二根是所攝幾何之蘊處界耶二十二根是所攝四蘊七處十三界幾何非攝耶非攝一蘊五處五界一三二無明是所攝於一蘊一處一界幾何非攝耶非攝四蘊十一處十七界一三三無明緣行是所攝於一蘊一處一界幾何非攝耶非攝四蘊十一處十七界一三四行緣識是所攝於一蘊一處七界幾何非攝耶非攝於四蘊十一處十一界一三五識緣名色是所攝於四蘊十一處十一界幾何非攝耶非攝一蘊一處七界一三六名色緣六處是所攝於二蘊六處十二界幾何非攝耶非攝三蘊六處六界一三七六入處緣觸是一三八觸緣受是一三九受緣愛是一四愛緣取是一四一取緣業有是所攝於一蘊一處一界幾何非攝耶非攝於四蘊十一處十七界一四二一四五生有欲有想有五蘊有是所攝於五蘊十一處十七界幾何非攝耶亦無非攝如何之蘊非攝一處一界一四六色有是所攝於五蘊五處八界幾何非攝耶亦無非攝如何之蘊非攝七處十界一四七一四九無色有非想非非想有四蘊有所攝於四蘊二處二界幾何非攝耶非攝於一蘊十處十六界一五一五一無想有一蘊有所攝於一蘊二處二界幾何非攝耶非攝四蘊十處十六界一五二一五四生老死又此等是所攝於二蘊一處一界幾何非攝耶非攝於三蘊十一處十七界一五五一六一愁悲苦憂惱念處正勝是所攝於一蘊一處一界幾何非攝耶非攝四蘊十一處十七界一六二神足是所攝於二蘊二處二界幾何非攝耶非攝三蘊十處十六界一六三靜慮是所攝於二蘊一處一界幾何非攝耶非攝於三蘊十一處十七界一六四一七四無量心五根五力七覺支八聖道觸受想思勝解作意是所攝於一蘊一處一界幾何非攝耶非攝於四蘊十一處十七界一七五心是所攝於一蘊一處七界幾何非攝耶非攝於四蘊十一處十一界一七六善法不善法是所攝於幾何之蘊處界耶善法不善法是所攝於四蘊二處二界幾何非攝耶攝於一蘊十處十六界一七七無記法是以無為法除蘊而外所攝於五蘊十二處十八界幾何非攝耶亦無非攝如何之蘊處界一七八樂受相應法是一七九苦受相應法是所攝於三蘊二處三界幾何非攝耶非攝於二蘊十處十五界一八不苦不樂受相應法是所攝於三蘊二處七界幾何非攝耶非攝於二蘊十處十一界一八一異熟法是所攝於四蘊二處八界幾何非攝耶非攝於一蘊十處十界一八二異熟法法是一八三染污法是所攝於四蘊二處二界幾何非攝耶非攝一蘊十處十六界一八四非異熟非異熟法法是以無為法除蘊而外所攝於五蘊十二處十三界幾何非攝耶亦無非攝如何之蘊非攝五界一八五執受有取法是所攝於五蘊十一處十七界幾何非攝耶亦無非攝如何之蘊非攝一處一界一八六無執受有取法是所攝於五蘊七處八界幾何非攝耶亦無非攝如何之蘊非攝五處十六界一八七無執受無取法者一八八不染不污法是以無為法除蘊而外所攝於四蘊二處二界幾何非攝耶非攝於一蘊十處十六界一八九不染污法是所攝於五蘊十二處十八界幾何非攝耶亦無非攝如何之蘊處界一九有尋有伺法是所攝於四蘊二處三界幾何非攝耶非攝一蘊十處十五界一九一無尋唯伺法是所攝於四蘊二處二界幾何非攝耶非攝一蘊十處十六界一九二無尋無伺法是以無為法除蘊而外所攝於五蘊十二處十七界幾何非攝耶亦無非攝如何之蘊處非攝一界一九三樂俱行法是所攝於三蘊二處三界幾何非攝耶非攝於二蘊十處十五界一九四捨俱行法是所攝於三蘊二處七界幾何非攝耶非攝二蘊十處十一界一九五見所斷法是一九六修所斷法是一九七見所斷因法是一九八修見斷因法是一九九積集行法是二無積行法是二一學法是二二無學法是二三大法是所攝於四蘊二處二界幾何非攝耶非攝一蘊十處十六界二四非見非修所斷法是二五非見非修所斷因法是二六非積集行非損行