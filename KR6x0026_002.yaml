body:
  text: 界論注歸命彼世尊應供等覺者惡魔之破折者大勇佛陀依分十八品章闡述分別論以連續説界論且説界分別吾當明其意入三昧者諦聽言本論是依攝非攝等分十四章其一切亦是説明與問答之二種説明以其論母分為五種定式論母內論母定式面論母相論母外論母俱備所攝非攝乃至不相應者之攝非攝等之十四句足者稱為定式論母原因於此論母之示處是依此所攝等之定式依分界論之諸法稱為定式論母又此論母是由成就三學之根本處亦言為根本論母具備五蘊乃至作意等之百二十五句足者稱為內論母因此於此等不云一切為法聚論界論之論母蘊等之諸法是依攝等之定式所分別説明時以形相表示界論內所説之處稱為內論母又蘊等之句足不存於法聚論之論母稱為特殊論母較為適當所攝於三法非攝於三法與四法相應與四法不相應依此四句而俱備者稱為定式面論母因此於此一切五蘊等列於善事等之論母法中攝非攝於蘊處界又可被結合於彼等同樣有四非色蘊之相應不相應此為示此等攝非攝等之定式面所置之處稱為定式面論母同分不同分依此二句足而俱備者稱為相論母因此於依同分相法有所攝之定式依不同分相法有非攝之定式同樣於相應非相應之定式可連結依俱行非俱行相為示攝等之相由所置處稱為相論母一切法聚論界論之論母與彼三法類之六十六法二法類之二百法皆具備者稱為外論母因此於此五蘊乃至作意如此於界論內部不言一切法聚云云者置於如此界論外之處名為外論母如以上所知論母有五種此是於所攝非攝等所攝是依生同生業數而有四種此處言一切剎帝利者來一切婆羅門一切毗舍一切首陀羅者來友毗舍佉一切正語正業正命之諸法是戒蘊之所攝也此稱為生所攝一生族云來之時一切之族姓者是如入於一所攝一切之拘薩羅人來一切之摩訶陀人來一切之巴爾卡查人來友毗舍佉一切正精進正念正定是定蘊之所攝也此名為同生所攝生於一處而共成長者來之時一切皆依共生依持有共住之機會如入於一之所攝一切乘象者來一切乘馬者來一切乘車者來友毗舍佉一切正見正思惟之法是慧蘊所蘊也此稱為業所攝因此凡依自己之業因如入於一所攝眼處是入於如何之蘊數耶眼處是入於色蘊數若眼處入於色蘊數者則眼處是可言為所攝於色蘊此名為數所攝以上於是有所了解依其相反而非攝可知依其分配而有攝非攝之句足依同起同滅同事同所緣而有相應其相反者乃不相應依此二之分配有相應者之不相應等依彼兩者之連結分配而有所攝者之相應與不相應等又五蘊等是於蘊分説等依所説之定式而可知又觸等是作為結論所敘述為共通於一切心生起之所説以上論母之注畢一一一今依五蘊等而俱備之論母與攝非攝等定式論母之句足結合而示之色蘊是依幾何之蘊云云之定式而開始有説明文依攝非攝等之定式論母則如言所攝於三法非攝於三法雖建立定式論母從此為示色蘊等之所攝於幾何之蘊處界云云舉三之蘊處界之句足云云者亦無一提及四諦等如同分不同分建立相論母之同理由依其問答而云色蘊是等一蘊此等之蘊等是其同分此處於一蘊者是於色蘊之意依如何亦色亦色蘊與同分而入色蘊之攝被列為色蘊之數限定於色蘊十一處者是除去意處凡色蘊是依眼處乃至觸處之十處與法處而為十一處是故被列為十一處之數所限定云云十一界者是除去七識界其餘之十一界因此此等十一界無非於色所攝於非攝定式之説明幾何非攝耶是概要而問又於回答是四蘊一意處七識界者是由於色蘊之不同分云四蘊等依此定式而於一切之句足之攝非攝可知又於此蘊之説明色蘊於幾何蘊等之文有一根法攝之定式者五問五答者以表示完整形狀有非攝之定式是五問五答以示概要之略形依此方法而二根法等之問答亦可知由色蘊根而至二三四根所列示又於第五之色蘊乃至識蘊者如言分拆再者五蘊是幾何之蘊者如云不分拆如此成二種形式之問答如此所知言聖文之定式者是依於內論母也蘊句足之問答畢一一七於處句足之問答等首先於處句足之問答眼處之依於一蘊者可知是所攝於一色蘊一眼處一眼界一一八於耳處等亦依前項之定式而知攝與非攝一二八無為法除蘊而外此處又有理由而無為法處即是涅槃不入彼蘊之攝以此云除蘊外依四蘊者是以色受想行蘊而除涅槃之法處是依此等之所攝其法處是共依識蘊除法處法界外即依餘之處界亦非所攝是故云非攝於一蘊十一處十七界可進行一方之色蘊根分等同於他方之眼處等之判斷一四示於聖文二法迄十二處云云不豫分拆而問答一四一於界之問答是此定式一七七於諦問答一切之二三四法亦示於聖文又云於道諦之答亦由相似於二三法集諦之處其答案即連續於集一九於根之問答命根是依二蘊即色命根是於色蘊非命根是所攝於行蘊其餘追憶依既述之定式而知聖文之決定是如處界之問答一一三四於緣起之問答不以無明開始問於幾何之蘊無明緣行於一蘊如是以答示此處如言行緣識有伺身識之結合進展一切為異熟識因此云所攝於七界一一三七名色可知依結合身識之進展因此又由此取六處而示為十一處之所攝一一三九於觸等可知蘊之分拆因此於觸是一蘊所攝受是他之蘊又愛取業有是行蘊所攝又有之句足是依業有等十一種而分一一四三業有是由觸等與相似之答處以示此等觸與共一起生有欲有想有五蘊有是有由相互相似之答處一起表示又此等是由有執受法處云十一處十七界因此於聲處是無執受此處不豫採納一一四八於色有之問答於五處者是於眼耳意色法處於八界者是於眼耳眼識耳識色法意界意識界一一四九非色等之三是由有相似之答處一起表示一一五二三同有無想有一蘊有此處於二處者是於色處與法處於界亦同定式因此由於住同一處俱有其餘梵天之眼即由舉示其所緣之色處一一五四生於二蘊是色生之色蘊與非色生之行蘊對老死亦同一定式一一五七於愁等於一蘊者愁苦憂是於受蘊悲是於色蘊惱等是於行蘊同可知其他之蘊一一六三神足於二是行識蘊意法處法意識界靜慮於二蘊者是受行蘊也一一六四無量等是由有相似問答之處一同説明一一七五又心是置於思之後由答相異處之問而成於無量等於一蘊者是於受蘊又想者是於想蘊心者是於識蘊其餘所攝於行蘊同可知其餘之蘊一一七六以上示內論母所攝今為示外論母所攝述出善法等於三受是於三界為身識意識法界於七界者是是眼耳鼻舌之各識界與意法意識界於三異熟八界者是於前述之法與身識界一一八二又異熟法法是由有與染污法相似答之處一同攝取於一切之二三句足然有句足與句足相似之答一同攝取而答因此追憶既説而可知攝非攝之定式攝非攝句足畢二二一今為分別所攝者之非攝句以與眼處共等之文為始此處有如下之説明此時有何等之彼法所攝於蘊之句足非攝於處界之句足或有所攝於蘊處之句足非攝於界之句足依此蘊等問非攝之答此問之句足是不適當於色蘊等因此於色蘊是為色蘊之所攝又色蘊確實沒有非攝於十一之處界者與如眼耳鼻色聲乃至法處之十一色有關之句足受蘊是受蘊之所攝而受蘊又無非攝於法處法界如此由無所謂非攝者此等以及其他同類於此之意處法處等之句足於此時不豫採納而有何等之句足不混淆非色而包攝於色且明確者以及不混淆其他而包攝於識且明確者於此處給豫採用又最後十處十七界念根無想有一蘊有悲有見有對無見及有對所造性如是攝頌之偈示之故依此等非可知其所攝與非攝因此於此時對於質問有關處界得同樣之答設纏二十法一問纏七識界一問纏七根一問纏二有一問依悲以及有見有對一問依無見有對一問依有見一問依有對與所造性一問如此設八問此等之中蘊等之分拆可知如下即於第一問依於四蘊是依非色之蘊受想行識依於二處是依於眼處等之一與意處依於八界是依於眼界等之各一與七識界以上為定式色蘊耳鼻色聲乃至法處是與眼處共為蘊攝所攝彼眼處具攝色蘊之時於處之攝是處中之眼處唯眼處所攝其餘十處乃非攝又唯眼界是界攝所攝其餘之十界乃非攝如是彼處非攝十處是非攝於眼處與意處等之二處又於彼界非攝十界者是非攝於眼界與七識界對有關色處等亦是此法為定式二二於第二質問以識蘊所攝於如何之識界是無非攝於意處故言處攝所攝此處又依於四蘊是色等之四蘊於十一處是除去意處十二界是由原來之十八界除去六識界所剩下之十二界其中含眼識界唯眼識界所攝其他非攝於眼識界對耳識界等亦同定式二三於第三問眼根等之答等於眼處等對於女根男根以含法含二處法界之八界應當知二四於第四問三處者是色處法處意處因此於此等色處法處之二處是非攝於此等有其餘之九色處是所攝於此等有言非攝於此二色處法處與意處之二或三九界是色界法界與七識界二五於第五問二處者是關於第一句乃聲處法處意處而關於第二句是色處意處界亦此等之一與識界可知之二六於第六問十處是除去色處與法處十六界是除去色界與法界如何之理由因為云無見有對法是為九粗之處與此等共所攝於蘊攝者是色蘊此等九處是所攝於處攝而與此共色處法處者乃非攝又此等九界是所攝於界攝而色界與法界者是與此共非攝如此與此等共非攝之二處者是除去色處之九粗處與意處即為非攝於十處又與此等共非攝之二界者是除去色界之九粗界與七識界即可知為非攝於十六界二七於第七問二處者是色處與意處八界者是色界與七識界二八於第八問十一處者是關於有對法除去法處於所造性法除去觸處於界亦同定式八結亦可依此述之定式而知之所攝者之非攝之文畢三三一今為分拆非攝者之所攝之句足與受蘊共之文始此處有説明如下此時非攝於蘊攝而所攝於處界之句足者問蘊所攝之答如此之句足者不適當於色蘊識蘊眼處等因為於四蘊與色蘊共非攝於蘊攝雖為此等四蘊之一法而無與此色蘊共所攝於處界之攝然而受等是所攝於法處耶所攝也又色蘊乃非所攝於法處因為於由色蘊唯精妙之色入於法處是故所攝於法處者即無所攝於色蘊又於識蘊其餘之四蘊為非攝雖為彼等四蘊之一法而無與彼識蘊共所攝於處界之攝如此依其無所攝此等其他同種之眼處等之句足者於此時不豫採用識或者不混淆粗色之法處唯明確之句足在此處給豫採用以下為彼等句足之攝頌三蘊諦與十六根於緣相之十四更有十四句足及於十類聚之三十句足小二法中之二大二法中之八又於此等句足有相似答句足為一起成為十二問當知此等中蘊之分別可是無處界之分拆於第一問三蘊者是色蘊想蘊行蘊又處界者應知是法處法界以上於受蘊之定式所謂涅槃與精妙之色想行者乃非攝於蘊攝所攝於處界之攝其中涅槃是不入於蘊攝餘者入於色想行蘊之攝而且涅槃亦入於處界之攝故云無為法除蘊而外所攝於三蘊一處一界於想之部分於除想含受之三蘊行等應知是除行蘊而外之色受想之三蘊於第二問四蘊者是除識蘊而外之餘蘊此等與滅共非攝於蘊攝所攝於處界之攝於第三問二蘊者是受蘊想蘊因為於受想識蘊是與色非色之命根共非攝於蘊攝可是其中之受想是所攝於處界之攝故云與受想蘊共依此方法一切所涉蘊之分拆乃可知再者於其他以言蘊之名三四於第四問三蘊者於女根男根是受想行於第五受是色想行與信根等於最後之觸是色受想蘊於受相似於受蘊者於愛取業有相似於行是不同之點三五於第五問有生老死乃相似於命根而且涅槃精妙之色及想與靜慮共非攝於蘊攝所攝於處界之攝由此與彼等一起之色想二蘊是可理解三六於第六問愁等之三是相似於受惱等乃相似於行受是相似於受蘊想是相似於想蘊思是相似於行蘊等之區別依此方法於第七問等攝亦可理解非攝者之所攝之文畢四四一今為分拆所攝者所攝之文以集諦等為始此處有所攝於蘊等更與彼共所攝於蘊等如此為問所攝之答涉及蘊處界一切之句足而採納其一則不相應所舉之文因為於涉及一切蘊等之句足或與蘊等之句足共或無云與蘊等之句足共所攝一旦為自身共取得所攝可再與彼等進入回到所攝故如上所述之句足者於此時不豫採納與他無混淆之單一行蘊或者單一之受或精妙之色或單一之想而明確者此處乃給豫採用以下為彼等之攝頌二諦十五根十一緣起更有十一法類聚句足三十種問此處有二於問題所舉之句足是共所攝於蘊之攝如彼諸法一起皆言於一蘊等此處有如下之定式除愛而外其餘之行與集諦愛共所攝於蘊攝愛者又與彼等其餘之行者所攝彼愛是與諸行共所攝於蘊攝此為涉及一切之定式於非色法之問行蘊或受蘊乃言一蘊於色法之問色蘊是悲之問聲處言一處又聲界言一界於其他之時依法處法界而意義可理解所攝者之所攝之文畢五五一今為分拆非攝者之非攝文而依於色蘊等文為始於蘊等有非攝有與彼共更非攝於蘊等如此為蘊等非攝之問答在五蘊之領域苦諦等識與精妙色之領域無見有對等之句足此問是不適當因為於涅槃乃與如此句足共同不入於蘊攝無非攝於餘蘊之諸法故如此之句足於此時不豫採用而且於五蘊之識是很明白不與精妙之色共在此處給豫採用彼等之攝頌者如左一切之蘊同處界三諦由根諦緣二十三由他十六句足作者四十三類聚之七十小二法之七句足大二法之句足十八乃更述十八法乃可知餘此處不語問與類似之答者一起共有三十四此處於問所舉之句足與何等之法共非攝於蘊以何等之法一起言於一蘊等此處定式者如下與色蘊共四蘊受想行識及涅槃是非攝於蘊攝可是於處界之攝除識餘受想行是與色共所攝如此雖唯言識與三法共非攝於蘊攝等又此識與涅槃乃四蘊色受想行為非攝於蘊等之攝此等一切是四蘊與識共非攝於蘊等之攝如此言非攝於一蘊一處七界或有如此之解釋識與色蘊共同非攝於蘊等三蘊又彼色法與彼之識法共非攝於三者之攝識乃於蘊是一識蘊於處是一意處於界是七識界故言於一蘊等依此方法凡舉所問之句足何等之彼法非攝於蘊等之時關於其何等彼法蘊等乃可知之五二於第二問依色識可知因為於受等與色識共非攝於蘊等之攝而此之二蘊色識者是十一處十七界五三於第三問識乃非攝於色等之四如此依此四蘊等可知五四於第四問眼處者是與受等之四句足共非攝依此方法而凡涉及蘊等可知最後於章末於色與法處等攝頌之偈所示之法是依其他之方法結合而所示六六一今為示分拆相應不相應之文而以色蘊等之文為始此處可能者或不可能者者一切尋問又於不能回答者乃不拒為無由言四法相應與四四不相應同分不同分依四法唯於非色蘊同分之於唯一之連續剎那生唯得非色蘊之互相相應色法與色或涅槃之相應又云涅槃與色無相應者同云色涅槃與非色蘊無相應者是此等色涅槃是彼等非色蘊之不同分又如非色蘊與色涅槃之無相應者間斷連續剎那相異無與非色法之相應如此對於連續剎那之依不同分而為不同分又此不同分是依所攝無礙不存所攝之定式因為在於所攝只不過入數而已又於相應之定式有依同一生起等之互相相應如是與彼一法相應之互相不適當者於雖問所攝亦不拒絶與彼不相應之互相為適當者即示不相應又於句足雖為七識界之一為不相應明是色或與涅槃混合之法者此處視為不適當而決不豫採用彼等之攝頌如下法處法界苦諦與命生老死於三法之十九於類聚之五十於小二法之八句足大二法之十五其他之十八百二十三句足乃如是依相應而得因為於法處是由色涅槃之混合者即依非攝於識亦不能言相應又云受蘊等是由於與識蘊相應不得言有不相應者於餘亦同定式如是凡涉及此等即不適當且不豫採用其餘之蘊等為適當則採用彼等而一一一起問答於其第一問於一處是意處於一部分是包含法處法界之受想行六二於第二問三者是除各問者而外之餘者四非色蘊中之三與一部分相應者是受想行與法處法界中之行他行亦除其自身以外與一部分不相應者是色與涅槃法處法界中之無見無對色與涅槃如此凡涉及一切色之不相應於法處法界可見非色與非色及不相應之色六三於第三問者是意義明瞭六四於第四問者即不言幾何之蘊等而言無相應此處又依蘊等可知他於如是問亦同一定式因為於第一問以示俱形於其他聖文乃給豫簡略依此定式應知凡涉及一切之意義又學習終了之時是以其完成為進六七十六界者是自除眼識界乃六識界與十色界對於其餘是同定式六八三蘊者是除行蘊而外其餘之非色蘊一界者是意識界所言集道諦者是無與其他之界者相應一蘊者是行蘊一處者是法處一界者是法界因為於此等彼二諦者是其一部分相應六一一於樂根等之問三者是想行識一界者是身識界或者意識界十六界中之六界者是除去身識界餘之六識界六一八於色有之問有一切之非色蘊或者非色處之想應故如何言蘊處亦無非相應又無與鼻舌身識界之相應故言與三界不相應六二九於勝解之問二界者是意界意識界十五者是其餘之十色界與眼等之五識界六三於善之問依善而所把握非色之四蘊拒絶相應六三一於三受之問一蘊者是受蘊十五界者是眼耳鼻舌識界與意界及十一十色界又身識界與色界六三五於非異熟非異熟法法之問五界者是眼識界等六三六於無執受無取法之問三六者是除去意識界六三七於有尋有伺之問十五界者是五識與十色界六三八於無尋唯伺之問一蘊者應知是行蘊言第二禪者是除伺而外其餘之無尋唯伺除喜而外其餘之喜俱行伺是伺與喜無與喜相應故言與行蘊法處法界之部分相應十六界者是除去法界意識界六三九於無尋無伺之問一界者是意界六四樂俱行與捨俱行四一即或者稱為三受者見所斷四二是等於善法三小所緣四四是等於異熟法三三於彼一界者是法界與一部分相應者是見此小所緣因為於此處之法界為小所緣之六心起由處所攝於四分配第一之否定六四五大所緣法等者是等於善法六四六於非已生之問五界者是眼識等因為於此等以完全生起法之性質者為屬於已生之部六四八現在所緣等是等於小所緣因等五是等於集諦八有因非因五二是等於喜俱行七四取見相應六一是等於無執受非已生三六無執受無取法餘者一切意義明瞭相應不相應之文畢七七一今為分拆相應者之不相應之文而以受蘊等為始此處説明如下此處有與所舉句足相應之法更有與此法不相應之法於其不相應法之蘊等以問不相應而答之其相應法於色蘊等言不適當是言無相應於色蘊故此色蘊及他色之句足處等於此時不豫採用相應於法界之諸法與他不混淆之識明確而豫採納彼等之攝頌者如下四蘊一處二根七界足三緣七觸三法之三大二法之七一一有尋有伺結合於捨者之一最後四蘊者是亦含有最初之意義關於有同樣之答與此一起為受等之問於此等如以下蘊等之分説可知之於受蘊等之問一處者是意處七思者是識界一部分者是於法處之受等七二於識界之問此等之諸法者如何亦與蘊處非為不相應者是除了所舉句足之識界而外餘為六識界法色涅槃依此等而一切蘊處是由所攝與任何之蘊處皆不為不相應一界者是所舉問也七四於捨根之問五界者是捨相應之眼識界等於依此定式與一切所舉問之句足不相應者其意義可知相應者之不相應之文畢八八一今為分拆不相應者之相應之文以色蘊等為始此處一切之問是愚問因為於與色蘊不相應之四蘊謂與其四蘊以外者無相應與受蘊不相應之色涅槃者亦無與任何者相應如是於一切之句足無不相應者之相應可知之如是由於為愚問故無一切之答無者乃是解問也不相應者之相應之文畢九九一今為分拆相應者之相應之文而以受蘊等之文為始此處更有相應於蘊等者而問與蘊等相應為答如此之法混淆著色或色之間或凡色蘊所攝之句足者不應柑挾之又言對於混淆色或色者與其他不存相應凡色蘊所攝者又與凡得把相應蘊等握之相違者則不存在與色相應故如此之句足此處乃不豫採用於此色不混淆非色明確乃採納之彼等之攝頌者如下非色之四蘊意處七識界二諦十四根十二因緣更有十六句足三法之八類聚之四十三大二法之七句足後二法問答所攝九又於一切之問由於所舉問法與相應蘊分拆乃可知又言受蘊與其他三蘊是相應更於此等與受蘊是相應其受是與想等之三蘊意處七識界法處法界之一部分即想行相應涉此一切之定式相應者之相應文畢十一一今為分拆不相應者之不相應之文而以色蘊等之文為始於相應不相應句足之問答所舉出色蘊等法於此一切之問類似答之句足為令一致置於其他連續由於所舉問之句足不相應故知蘊等之分拆因為於受蘊等是與色蘊不相應色蘊又與其受蘊等不相應又屬於涅槃與精妙之色者亦然彼色蘊是四蘊一處七識界法處法界之一部分即與受等之法不相應此為涉一切之定式不相應者之不相應之文畢十一一一一今為分拆所攝者之相應與不相應文而以集諦等文為始首先所攝者於所攝文之問答第七章所舉彼集諦等之諸法是於舉一切之問又有類似之答者即由處一起採納句足是連續其他而來於舉問之諸法是與句足共所攝於蘊攝而此等又與他法相應或不相應之時則關係他法蘊等之分拆乃可知之此處有如下之定式集諦中行蘊所攝之諸法是所攝於蘊等之攝又此等與餘之三蘊一意處七識界相應又言於法處法界除愛之餘者行蘊是與由處相應之一部分相應又與一色蘊十色處十色界不相應又於一法處法界與其色涅槃不相應而即與一部分不相應依此方法而一切所涉之意義可知所攝者之相應與不相應畢十二一二一今為分拆相應者之所攝非攝之文而以受蘊等為始於所攝者之所攝文之問答所舉受蘊等之法此等所舉一切之問所舉於問之諸法是與句足相應由於所攝此諸法或非攝故蘊等之分拆乃可知之有以下之定式受蘊是與想等相應彼想等是所攝於想等之三蘊法處意處之二法界與七識界之八界其餘非攝於蘊處界依此方法而涉及一切之意義可知之相應者所攝非攝之文畢十三一三一今為分拆非攝者之相應與不相應文而以色蘊等説為始於第五章非攝者之非攝文之問答舉出有問色蘊與類似之諸法及非色有與類似者其餘非有效者不豫舉出因為於色非色之諸法是與受蘊共非攝於蘊等又言無此等色非色非色有之諸法相應者故唯有效之句足乃與類似之答共一起給豫舉示所舉問之諸法而與諸法共非攝於蘊等由於與此等相應又不相應者則蘊等之分別可知有以下之定式識蘊是與色蘊共非攝於三蘊之攝與受等之三蘊以及法處法界中之受等相應與一色蘊十色處十色界以及法處法界中之色涅槃法不相應以上一同言此等之諸法是與三蘊相等依此方法涉一切之意義可知之非攝者之相應與不相應文畢十四一四一今為分拆不相應者之所攝非攝文而以色蘊等説為始此處其不相應且不適切之句足者於此時不豫採用如此者是法處等因為於言法處乃與蘊等之一不相應者為不適切於法界亦同為定式彼等之法攝頌如下法處處界命根名色句足及六入生等之三一句足三法中之第二十三法中終之一小二法中之七句足類聚中之十大二法之十四更於六句足所舉出一切有關聯又十四法及七法乃為不可能章末之法處法界之偈頌亦明此意義除此等而外餘之一切者為可能對此等蘊等之分別應依憶念既述定式而可知不相應者之所攝非攝文畢如來界分別之善事彼之界説如以下曰彼如來説明此定式面分別畢依此定式面分別之説明賢者即得知一切又定式之約説乃如是所説若增修一一句足者詳細之説明增修極多之措詞又不豫分別意義者二倍者乃唯滅其聖句依豫所為此悲心所達之功德成為世間之幸福界説論注畢
